<!DOCTYPE html>
<html>
<head>
    <title>Security Panel</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; }
        .center { text-align:center; padding-top:100px; }
        input { padding:10px; width:250px; }
        button { padding:10px 20px; margin-top:10px; cursor:pointer; }
        .box { background:#222; padding:40px; display:inline-block; border-radius:8px; }
        .wrap { padding:40px; }
        a { color:#4af; }
    </style>
</head>
<body>

<div id="login-view" class="center">
    <div class="box">
        <h1>Admin Login</h1>
        <input type="password" id="pw" placeholder="Enter password">
        <br>
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="admin-view" style="display:none;">
    <div class="wrap">
        <h1>Security Dashboard</h1>
        <p>Your visitor IP logs are stored in Cloudflare (proxying this site).</p>
        <p>
            <a href="https://dash.cloudflare.com" target="_blank">
                Open Cloudflare Logs
            </a>
        </p>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<script>
    const PASSWORD = "i3u8rify47y";

    function showView() {
        const authed = localStorage.getItem("auth") === "true";
        document.getElementById("login-view").style.display = authed ? "none" : "block";
        document.getElementById("admin-view").style.display = authed ? "block" : "none";
    }

    function login() {
        const pw = document.getElementById("pw").value;
        if (pw === PASSWORD) {
            localStorage.setItem("auth", "true");
            showView();
        } else {
            alert("Incorrect password");
        }
    }

    function logout() {
        localStorage.removeItem("auth");
        showView();
    }

    // On load
    showView();
</script>

</body>
</html>

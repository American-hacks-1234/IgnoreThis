<!DOCTYPE html>
<html>
<head>
    <title>Security Panel</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; background:#111; color:#eee; margin:0; }
        .center { text-align:center; padding-top:100px; }
        input { padding:10px; width:250px; }
        button { padding:10px 20px; margin-top:10px; cursor:pointer; }
        .box { background:#222; padding:40px; display:inline-block; border-radius:8px; }
        .wrap { padding:40px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { border:1px solid #444; padding:8px; }
    </style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login-view" class="center">
    <div class="box">
        <h1>Admin Login</h1>
        <input type="password" id="pw" placeholder="Enter password">
        <br>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- ADMIN VIEW -->
<div id="admin-view" style="display:none;">
    <div class="wrap">
        <h1>Failed Login Attempts</h1>
        <p>These logs are stored ONLY on this device.</p>

        <table id="log-table">
            <tr><th>Time</th><th>Wrong Password Entered</th></tr>
        </table>

        <button onclick="clearLogs()">Clear Logs</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<script>
    const REAL_PASSWORD = "i3u8rify47y";

    function login() {
        const entered = document.getElementById("pw").value;

        if (entered === REAL_PASSWORD) {
            localStorage.setItem("auth", "true");
            loadLogs();
            showAdmin();
        } else {
            logFailedAttempt(entered);
            alert("Incorrect password");
        }
    }

    function logFailedAttempt(wrongPw) {
        const logs = JSON.parse(localStorage.getItem("pwLogs") || "[]");
        logs.push({
            time: new Date().toLocaleString(),
            wrongPassword: wrongPw
        });
        localStorage.setItem("pwLogs", JSON.stringify(logs));
    }

    function loadLogs() {
        const logs = JSON.parse(localStorage.getItem("pwLogs") || "[]");
        const table = document.getElementById("log-table");
        table.innerHTML = "<tr><th>Time</th><th>Wrong Password Entered</th></tr>";

        logs.forEach(l => {
            table.innerHTML += `
                <tr>
                    <td>${l.time}</td>
                    <td>${l.wrongPassword}</td>
                </tr>
            `;
        });
    }

    function clearLogs() {
        localStorage.removeItem("pwLogs");
        loadLogs();
    }

    function logout() {
        localStorage.removeItem("auth");
        showLogin();
    }

    function showAdmin() {
        document.getElementById("login-view").style.display = "none";
        document.getElementById("admin-view").style.display = "block";
    }

    function showLogin() {
        document.getElementById("login-view").style.display = "block";
        document.getElementById("admin-view").style.display = "none";
    }

    // Auto-login if already authenticated
    if (localStorage.getItem("auth") === "true") {
        loadLogs();
        showAdmin();
    }
</script>

</body>
</html>
